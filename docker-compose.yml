services:
  slayfridaybot:
    image: ghcr.io/jojosoderqvist/slay-friday-bot:main
    container_name: slayfridaybot
    env_file:
      - .env
    environment:
      - RUST_LOG=info
    volumes:
      - ./sticker_storage.json:/app/sticker_storage.json
    networks:
      - slay-network
    restart: unless-stopped
    depends_on:
      - xray-proxy
      - loki

  media_db:
    image: postgres:18.3
    ports:
      - "5500:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${MEDIA_DB_USER}
      - POSTGRES_PASSWORD=${MEDIA_DB_PASSWORD}
      - POSTGRES_DB=${MEDIA_DB_NAME}
    volumes:
      - media_data:/var/lib/postgresql/data/
    container_name: media_db
    restart: unless-stopped
    networks:
      - slay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  xray-proxy:
    image: teddysun/xray:26.2.6
    container_name: xray-proxy
    command: ["xray", "run", "-c", "/etc/xray/config.json"]
    volumes:
      - ./xray-config.json:/etc/xray/config.json:ro
    ports:
      - "8100:8100"
    restart: unless-stopped
    networks:
      - slay-network

  loki:
    image: grafana/loki:3.5.10
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - slay-network

  grafana:
    image: grafana/grafana:12.0
    container_name: grafana
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_PASSWORD}
    depends_on:
      - loki
    networks:
      - slay-network

volumes:
  loki_data:
  grafana_data:
  media_data:

networks:
  slay-network:
    driver: bridge
